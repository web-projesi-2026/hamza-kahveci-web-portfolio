<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projeler — Hamza Kahveci</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico" />
  <style>
    /* UX Arama ve Filtreleme Alanı */
    .filter-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }
    .search-box {
      max-width: 300px;
      width: 100%;
    }
    .filter-buttons {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.5rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'DM Mono', monospace;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface2);
    }

    /* Favori butonu */
    .project-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.2rem;
      gap: 0.75rem;
    }
    .fav-btn {
      background: none;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      padding: 0.4rem 0.85rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .fav-btn:hover, .fav-btn.aktif {
      background: var(--accent);
      color: #fff;
    }
    .fav-btn .kalp { font-size: 1rem; }
    
    .fav-bildirim {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: var(--accent);
      color: #fff;
      border-radius: 12px;
      padding: 0.6rem 1.1rem;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .fav-bildirim.goster { opacity: 1; transform: translateY(0); }
    .yukleniyor { text-align: center; padding: 3rem; color: var(--muted); font-size: 1rem; }
    
    /* Yedek kaynak uyarı bandı */
    .fallback-banner {
      background: rgba(234,179,8,0.12);
      border: 1px solid rgba(234,179,8,0.4);
      color: #ca8a04;
      padding: 0.7rem 1.2rem;
      border-radius: 6px;
      font-size: 0.82rem;
      margin-bottom: 2rem;
      display: none;
    }
    .fallback-banner.goster { display: block; }

    .project-tag.canli          { background: rgba(34,197,94,0.12); color: #22c55e; }
    .project-tag.gelistiriliyor { background: rgba(234,179,8,0.12); color: #ca8a04; }
    .project-tag.planlaniyor    { background: rgba(148,163,184,0.12); color: #94a3b8; }
  </style>
</head>
<body>

  <!-- Nav, mobile-menu ve footer components.js tarafından otomatik eklenir -->

  <section style="padding-top: 8rem;">
    <div class="section-label fade-up visible">// Projeler</div>
    <h1 class="section-title fade-up visible" style="margin-bottom: 1.5rem;">Çalışmalarım</h1>

    <!-- Yedek veri kullanıldığında görünür -->
    <div class="fallback-banner" id="fallback-banner">
      ⚠️ Veritabanına bağlanılamadı — projeler yerel dosyadan yüklendi.
    </div>

    <div class="filter-wrapper fade-up visible">
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">Hepsi</button>
        <button class="filter-btn" data-filter="Web">Web</button>
        <button class="filter-btn" data-filter="Masaüstü">Masaüstü</button>
        <button class="filter-btn" data-filter="Tasarım">Tasarım</button>
      </div>
      <input type="text" id="ux-search" class="form-input search-box" placeholder="Proje ara..." />
    </div>

    <div class="projects-grid" id="projects-container">
      <p class="yukleniyor">Projeler yükleniyor...</p>
    </div>
  </section>

  <div class="fav-bildirim" id="fav-bildirim">❤️ Favorilere eklendi!</div>

  <!-- Bileşenler (nav + footer) ve genel scriptler -->
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/jScript.js"></script>

  <script type="module">
    import { db } from "../assets/js/firebase-config.js";
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const container     = document.getElementById('projects-container');
    const searchInput   = document.getElementById('ux-search');
    const filterBtns    = document.querySelectorAll('.filter-btn');
    const bildirim      = document.getElementById('fav-bildirim');
    const fallbackBanner = document.getElementById('fallback-banner');

    // JSON yedek dosyasının yolu
    const JSON_FALLBACK_URL = '../assets/data/projects.json';

    let tümProjeler    = [];
    let aktifKategori  = 'all';
    let aramaMetni     = '';
    let bildirimTimer  = null;
    let favoriler      = JSON.parse(localStorage.getItem('favoriProjeler')) || [];

    // ── Bildirim göster ──────────────────────────────────
    function bildirimGoster(mesaj) {
      bildirim.textContent = mesaj;
      bildirim.classList.add('goster');
      clearTimeout(bildirimTimer);
      bildirimTimer = setTimeout(() => bildirim.classList.remove('goster'), 2200);
    }

    // ── Favori güncelle ──────────────────────────────────
    function favoriGuncelle(id, btn) {
      const idx = favoriler.indexOf(String(id));
      if (idx === -1) {
        favoriler.push(String(id));
        btn.classList.add('aktif');
        btn.querySelector('.etiket').textContent = 'Favorilendi';
        bildirimGoster('❤️ Favorilere eklendi!');
      } else {
        favoriler.splice(idx, 1);
        btn.classList.remove('aktif');
        btn.querySelector('.etiket').textContent = 'Favorile';
        bildirimGoster('🤍 Favorilerden çıkarıldı.');
      }
      localStorage.setItem('favoriProjeler', JSON.stringify(favoriler));
    }

    // ── Kartları filtrele ve ekrana bas ──────────────────
    function projeleriFiltreleVeListele() {
      container.innerHTML = '';

      const filtrelenmiş = tümProjeler.filter(proje => {
        const kategoriUyum = aktifKategori === 'all' || proje.category === aktifKategori;
        const aramaUyum =
          proje.title.toLowerCase().includes(aramaMetni) ||
          proje.desc.toLowerCase().includes(aramaMetni);
        return kategoriUyum && aramaUyum;
      });

      if (filtrelenmiş.length === 0) {
        container.innerHTML = `<p class="yukleniyor">Aradığınız kriterlere uygun proje bulunamadı.</p>`;
        return;
      }

      filtrelenmiş.forEach(proje => {
        const favId   = String(proje.id);
        const isFav   = favoriler.includes(favId);
        const tagSinif = {
          'canlı': 'canli',
          'geliştiriliyor': 'gelistiriliyor',
          'planlanıyor': 'planlaniyor'
        }[proje.durum] || '';

        const tagHTML  = proje.tags.map(t => `<span class="project-tag">${t}</span>`).join('');
        const linkHTML = proje.link
          ? `<a href="${proje.link}" class="project-link" target="_blank" rel="noopener noreferrer">Canlıya Git →</a>`
          : `<span class="project-link" style="opacity:0.35;cursor:default;">Yakında →</span>`;

        const kart = document.createElement('div');
        kart.className = 'project-card fade-up visible';
        kart.innerHTML = `
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.6rem;">
            ${tagHTML}
            <span class="project-tag ${tagSinif}">${proje.durum}</span>
          </div>
          <div class="project-title">${proje.title}</div>
          <p class="project-desc">${proje.desc}</p>
          <div class="project-actions">
            ${linkHTML}
            <button class="fav-btn ${isFav ? 'aktif' : ''}" data-id="${favId}">
              <span class="kalp">${isFav ? '❤️' : '🤍'}</span>
              <span class="etiket">${isFav ? 'Favorilendi' : 'Favorile'}</span>
            </button>
          </div>`;

        kart.querySelector('.fav-btn').addEventListener('click', function () {
          favoriGuncelle(favId, this);
          this.querySelector('.kalp').textContent = favoriler.includes(favId) ? '❤️' : '🤍';
        });

        container.appendChild(kart);
      });
    }

    // ── JSON yedek veri yükle ────────────────────────────
    async function jsondenYukle() {
      const res  = await fetch(JSON_FALLBACK_URL);
      if (!res.ok) throw new Error('JSON dosyası okunamadı');
      const data = await res.json();
      // JSON'daki category alanı yoksa 'Web' varsay
      return data.map(p => ({ ...p, category: p.category || 'Web' }));
    }

    // ── Firebase'den veri çek, hata olursa JSON'a dön ───
    async function verileriGetir() {
      try {
        const q = query(collection(db, 'projects'), orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);

        // Firebase boşsa veya hata yoksa burası çalışır
        tümProjeler = [];
        snapshot.forEach(doc => {
          tümProjeler.push({ id: doc.id, ...doc.data() });
        });

        // Firebase boş döndüyse JSON'a düş
        if (tümProjeler.length === 0) {
          throw new Error('Firebase boş — JSON yedek kullanılıyor');
        }

        projeleriFiltreleVeListele();

      } catch (firebaseHata) {
        console.warn('Firebase başarısız, JSON yedek deneniyor...', firebaseHata);

        try {
          tümProjeler = await jsondenYukle();
          fallbackBanner.classList.add('goster'); // Kullanıcıya bildir
          projeleriFiltreleVeListele();
        } catch (jsonHata) {
          console.error('JSON yedek de başarısız:', jsonHata);
          container.innerHTML = `<p class="yukleniyor" style="color:var(--accent);">
            ⚠️ Projeler yüklenemedi. Lütfen sayfayı yenileyin.
          </p>`;
        }
      }
    }

    // ── Event Listeners ──────────────────────────────────
    searchInput.addEventListener('input', e => {
      aramaMetni = e.target.value.toLowerCase();
      projeleriFiltreleVeListele();
    });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        aktifKategori = btn.getAttribute('data-filter');
        projeleriFiltreleVeListele();
      });
    });

    // İlk yükleme
    verileriGetir();
  </script>
</body>
</html>
